<!doctype html>
<html lang="en">
	<head>
		<script>
			(function () {
				try {
					var k = 'medication-reference-theme';
					var t = localStorage.getItem(k);
					if (t === 'dark' || t === 'light') document.documentElement.dataset.theme = t;
					else if (window.matchMedia('(prefers-color-scheme: dark)').matches)
						document.documentElement.dataset.theme = 'dark';
				} catch (e) {}
			})();
		</script>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=JetBrains+Mono:wght@400;500;600&display=swap"
			rel="stylesheet"
		/>
		<meta name="text-scale" content="scale" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
